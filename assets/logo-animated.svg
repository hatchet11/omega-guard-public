<?xml version="1.0" encoding="UTF-8"?>
<!-- Omega Guard animated mark. (c) 2026 Omega Point Solutions LLC (proprietary). Omega Guard(TM). -->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Omega Guard animated mark">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1220"/><stop offset="1" stop-color="#102134"/>
    </linearGradient>
    <linearGradient id="og-accent" x1="0" y1="80" x2="0" y2="452" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0c074"/><stop offset="0.5" stop-color="#E5A93C"/><stop offset="1" stop-color="#c8862a"/>
    </linearGradient>
    <radialGradient id="og-glow" cx="0.5" cy="0.42" r="0.6">
      <stop stop-color="#5a4012" stop-opacity="0.9"/><stop offset="1" stop-color="#0b1220" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="og-sweep" x1="256" y1="262" x2="256" y2="62" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0c074" stop-opacity="0"/><stop offset="1" stop-color="#f0c074" stop-opacity="0.5"/>
    </linearGradient>
    <clipPath id="og-clip"><rect width="512" height="512" rx="104"/></clipPath>
  </defs>

  <!-- frame -->
  <rect width="512" height="512" rx="104" fill="url(#og-bg)"/>
  <rect width="512" height="512" rx="104" fill="url(#og-glow)"/>

  <g clip-path="url(#og-clip)">
    <!-- concentric detection rings (pulsing) -->
    <g stroke="#233b56" fill="none">
      <circle cx="256" cy="262" r="206" stroke-width="2">
        <animate attributeName="stroke-opacity" values="0.55;0.2;0.55" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="256" cy="262" r="158" stroke-width="2">
        <animate attributeName="stroke-opacity" values="0.25;0.6;0.25" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="256" cy="262" r="110" stroke-width="2" stroke-opacity="0.3"/>
    </g>

    <!-- rotating sweep wedge -->
    <g>
      <path d="M256 262 L256 62 A200 200 0 0 1 397.4 120.6 Z" fill="url(#og-sweep)"/>
      <line x1="256" y1="262" x2="256" y2="62" stroke="#bfe9ff" stroke-width="2.5" stroke-opacity="0.85"/>
      <animateTransform attributeName="transform" type="rotate" from="0 256 262" to="360 256 262" dur="6s" repeatCount="indefinite"/>
    </g>

    <!-- clone blip on the middle ring (flashes as it is caught) -->
    <circle cx="404" cy="208" r="7" fill="#f0506e">
      <animate attributeName="opacity" values="0;0;1;0.2;0" keyTimes="0;0.45;0.5;0.7;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="5;5;12;7;5" keyTimes="0;0.45;0.5;0.7;1" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- shield + omega (the verified mark, drawn over the scan) -->
  <path d="M256 92 L398 148 V286 C398 364 332 418 256 450 C180 418 114 364 114 286 V148 Z"
        fill="#0e1a2b" stroke="url(#og-accent)" stroke-width="6"/>
  <text x="256" y="346" font-family="Georgia,'Times New Roman',serif" font-size="232"
        fill="url(#og-accent)" text-anchor="middle" font-weight="700">&#937;
    <animate attributeName="opacity" values="0.82;1;0.82" dur="3.2s" repeatCount="indefinite"/>
  </text>
</svg>
