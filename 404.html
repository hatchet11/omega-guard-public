<style>
  :root{--bg:#0b1220;--acc:#38bdf8;--acc2:#7dd3fc;--t0:#f8fafc;--t1:#cfe0f0;--t2:#8aa3bd;--line:rgba(56,189,248,.16)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;
    display:grid;place-items:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
  .code{font:900 96px/1 'Inter';letter-spacing:-3px;
    background:linear-gradient(180deg,var(--t0),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .eye{font:600 12px 'JetBrains Mono',monospace;letter-spacing:2px;text-transform:uppercase;color:var(--acc2);margin-bottom:14px}
  h1{font-size:26px;font-weight:800;color:var(--t0);margin:14px 0 8px;letter-spacing:-.5px}
  p{color:var(--t2);max-width:440px;margin:0 auto 26px}
  .ctas{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn{font-weight:700;font-size:15px;text-decoration:none;padding:13px 22px;border-radius:11px;display:inline-flex;align-items:center;gap:8px}
  .btn-p{background:linear-gradient(135deg,var(--acc2),var(--acc));color:#052436}
  .btn-s{color:var(--t0);border:1px solid var(--line)}
  .btn-s:hover{border-color:var(--acc)}
  .mark{width:54px;height:54px;border-radius:13px;background:linear-gradient(135deg,var(--acc),#0c5a86);
    display:grid;place-items:center;margin:0 auto 22px;box-shadow:0 0 0 1px rgba(56,189,248,.45)}
  .mark svg{width:34px;height:34px}
</style>
</head>
